<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Maxi Shop – Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #dc2626; --dark: #0a0606; --card: rgba(255,255,255,0.04);
    --border: rgba(196,28,28,0.2); --text: #fee2e2; --sub: rgba(252,165,165,0.5);
  }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* ── LOGIN ── */
  .login-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--dark); z-index: 999; flex-direction: column; gap: 20px; padding: 24px; }
  .login-logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .login-logo span { color: var(--red); }
  .login-sub { font-size: 13px; color: var(--sub); margin-top: -12px; }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 28px 24px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 14px; }
  .login-label { font-size: 12px; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; }
  .login-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; width: 100%; }
  .login-input:focus { border-color: var(--red); }
  .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg,#dc2626,#7f1d1d); border: none; border-radius: 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
  .login-btn:hover { opacity: .88; }
  .login-err { font-size: 12px; color: #f87171; text-align: center; min-height: 16px; }

  /* ── DASHBOARD ── */
  .dash { display: none; flex-direction: column; min-height: 100vh; }
  .dash.visible { display: flex; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,6,6,0.95); backdrop-filter: blur(12px); z-index: 100; }
  .top-bar-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
  .top-bar-title span { color: var(--red); }
  .top-bar-actions { display: flex; gap: 10px; align-items: center; }
  .btn-sm { padding: 8px 14px; border-radius: 9px; border: 1px solid var(--border); background: var(--card); color: var(--sub); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-sm:hover { color: var(--text); border-color: var(--red); }
  .btn-danger { border-color: rgba(248,113,113,0.3); color: rgba(248,113,113,0.6); }
  .btn-danger:hover { border-color: #f87171; color: #f87171; background: rgba(248,113,113,0.08); }

  .content { padding: 20px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

  /* ── SECTIONS ── */
  .section-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title i { color: var(--red); font-size: 18px; }

  /* ── STAT CARDS ── */
  .stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px; text-align: center; }
  .stat-card-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); }
  .stat-card-label { font-size: 10px; color: var(--sub); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  /* ── ITEM ANALYTICS TABLE ── */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-row { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .item-row-name { flex: 1; font-size: 13px; color: var(--text); font-weight: 500; }
  .item-row-badge { font-size: 10px; color: var(--sub); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 999px; padding: 3px 8px; white-space: nowrap; }
  .item-row-stat { display: flex; flex-direction: column; align-items: center; min-width: 48px; }
  .item-row-stat-num { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .item-row-stat-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; }
  .bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg,#dc2626,#7f1d1d); border-radius: 2px; transition: width .4s; }

  /* ── EDITOR ── */
  .editor-grid { display: flex; flex-direction: column; gap: 10px; }
  .editor-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .editor-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .editor-card-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .editor-card-rarity { font-size: 10px; color: var(--sub); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; }
  .editor-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .editor-field-label { font-size: 10px; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  .editor-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; -moz-appearance: textfield; }
  .editor-input::-webkit-outer-spin-button, .editor-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .editor-input:focus { border-color: var(--red); }
  .save-btn { width: 100%; padding: 14px; background: linear-gradient(135deg,#dc2626,#7f1d1d); border: none; border-radius: 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s; margin-top: 6px; }
  .save-btn:hover { opacity: .88; }
  .save-confirm { text-align: center; font-size: 13px; color: #6ee7b7; min-height: 18px; margin-top: 6px; }

  .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .empty-state { text-align: center; color: var(--sub); font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-logo">𝐌𝐚𝐱𝐢 <span>Admin</span></div>
  <p class="login-sub">Shop Dashboard</p>
  <div class="login-box">
    <div class="login-label">Password</div>
    <input class="login-input" id="pw-input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dashboard">
  <div class="top-bar">
    <div class="top-bar-title">𝐌𝐚𝐱𝐢 <span>Admin</span></div>
    <div class="top-bar-actions">
      <button class="btn-sm" onclick="window.location.href='index.html'"><i class="ti ti-arrow-left"></i> Shop</button>
      <button class="btn-sm btn-danger" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <!-- ANALYTICS -->
    <div>
      <div class="section-title"><i class="ti ti-chart-bar"></i> Analytics</div>
      <div class="stat-row" id="stat-row">
        <div class="stat-card">
          <div class="stat-card-num" id="stat-pv">–</div>
          <div class="stat-card-label">Page Views</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="stat-sess">–</div>
          <div class="stat-card-label">Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="stat-atc-total">–</div>
          <div class="stat-card-label">Add to Cart</div>
        </div>
      </div>
    </div>

    <!-- ITEM STATS -->
    <div>
      <div class="section-title"><i class="ti ti-eye"></i> Item Views</div>
      <div class="section-card">
        <div class="item-list" id="item-views-list">
          <div class="empty-state">No views tracked yet. Visit your shop first!</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title"><i class="ti ti-shopping-cart"></i> Add to Cart Stats</div>
      <div class="section-card">
        <div class="item-list" id="item-atc-list">
          <div class="empty-state">No add to cart events yet.</div>
        </div>
      </div>
    </div>

    <!-- PRICE & STOCK EDITOR -->
    <div>
      <div class="section-title"><i class="ti ti-edit"></i> Edit Prices & Stocks</div>
      <div class="editor-grid" id="editor-grid"></div>
      <button class="save-btn" onclick="saveOverrides()">💾 Save Changes to Shop</button>
      <div class="save-confirm" id="save-confirm"></div>
    </div>

    <!-- DANGER ZONE -->
    <div>
      <div class="section-title"><i class="ti ti-trash"></i> Reset</div>
      <div class="section-card" style="display:flex;flex-direction:column;gap:10px">
        <button class="btn-sm btn-danger" style="width:100%;padding:12px" onclick="resetAnalytics()">🗑️ Reset Analytics Data</button>
        <button class="btn-sm btn-danger" style="width:100%;padding:12px" onclick="resetPrices()">🗑️ Reset Price/Stock Overrides</button>
      </div>
    </div>

  </div>
</div>

<script>
  // ── CONFIG ──
  var ADMIN_PASSWORD = 'SAKURA2026'; // Change this password!

  var ITEMS = [
    { name: 'Burguro & Fryuro',            priceId: 'price-burguro_fryuro',    rarity: 'Secret',        index: 0  },
    { name: 'Garama & Madundung (Gold 1)',  priceId: 'price-garama_madundung1', rarity: 'Gold ✨',       index: 1  },
    { name: 'Garama & Madundung (Gold 2)',  priceId: 'price-garama_madundung2', rarity: 'Gold ✨',       index: 2  },
    { name: 'Ketchuru & Musturu (Secret)',  priceId: 'price-ketchuru_musturu1', rarity: 'Secret',        index: 3  },
    { name: 'Ketchuru & Musturu (Gold)',    priceId: 'price-ketchuru_musturu2', rarity: 'Gold ✨',       index: 4  },
    { name: 'Money Money Puggy',            priceId: 'price-money_puggy',       rarity: 'Cursed 💀',     index: 5  },
    { name: 'Los Puggies (Diamond)',        priceId: 'price-los_puggies1',      rarity: 'Diamond 💎',    index: 6  },
    { name: 'Los Puggies (Secret)',         priceId: 'price-los_puggies2',      rarity: 'Secret',        index: 7  },
    { name: 'Celularo & Ciosini',           priceId: 'price-celularo',          rarity: 'Secret',        index: 8  },
    { name: 'Chicleteira Noelteira',        priceId: 'price-chicleteira',       rarity: 'Gold ✨',       index: 9  },
    { name: 'Gargantuan Gingerbread Angelus', priceId: 'price-angelus',        rarity: 'Gargantuan ✨', index: 10 },
    { name: '1B Gems',                      priceId: 'price-gems',              rarity: 'Gems 💎',       index: 11 },
  ];

  // ── AUTH ──
  function doLogin() {
    var pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('dashboard').classList.add('visible');
      loadDashboard();
    } else {
      document.getElementById('login-err').textContent = 'Wrong password. Try again.';
      document.getElementById('pw-input').value = '';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('admin_auth');
    window.location.reload();
  }

  // Auto-login if already authenticated this session
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    loadDashboard();
  }

  // ── LOAD DASHBOARD ──
  function loadDashboard() {
    // Stats
    var pv = localStorage.getItem('sa_pageviews') || '0';
    var sess = localStorage.getItem('sa_sessions') || '0';
    var atcData = JSON.parse(localStorage.getItem('sa_atc') || '{}');
    var atcTotal = Object.values(atcData).reduce(function(a, b) { return a + b; }, 0);

    document.getElementById('stat-pv').textContent = pv;
    document.getElementById('stat-sess').textContent = sess;
    document.getElementById('stat-atc-total').textContent = atcTotal;

    // Item views chart
    renderItemList('item-views-list', 'sa_views', 'Views');
    renderItemList('item-atc-list', 'sa_atc', 'ATC');

    // Editor
    buildEditor();
  }

  function renderItemList(elId, storageKey, label) {
    var el = document.getElementById(elId);
    var data = JSON.parse(localStorage.getItem(storageKey) || '{}');
    var entries = Object.entries(data).sort(function(a, b) { return b[1] - a[1]; });
    if (!entries.length) {
      el.innerHTML = '<div class="empty-state">No data yet. Visit your shop!</div>';
      return;
    }
    var max = entries[0][1] || 1;
    el.innerHTML = entries.map(function(e) {
      var pct = Math.round((e[1] / max) * 100);
      return '<div class="item-row">' +
        '<div class="item-row-name">' + e[0] + '</div>' +
        '<div class="bar-wrap"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="item-row-stat"><div class="item-row-stat-num">' + e[1] + '</div><div class="item-row-stat-label">' + label + '</div></div>' +
      '</div>';
    }).join('');
  }

  function buildEditor() {
    var savedPrices = JSON.parse(localStorage.getItem('sa_prices') || '{}');
    var savedStocks = JSON.parse(localStorage.getItem('sa_stocks') || '{}');

    var DEFAULT_STOCKS = [3,2,1,4,2,1,3,2,1,2,1,5];

    document.getElementById('editor-grid').innerHTML = ITEMS.map(function(item) {
      var curPrice = savedPrices[item.priceId] || '';
      var curStock = savedStocks[item.index] !== undefined ? savedStocks[item.index] : DEFAULT_STOCKS[item.index];
      return '<div class="editor-card">' +
        '<div class="editor-card-header">' +
          '<div class="editor-card-name">' + item.name + '</div>' +
          '<div class="editor-card-rarity">' + item.rarity + '</div>' +
        '</div>' +
        '<div class="editor-fields">' +
          '<div>' +
            '<div class="editor-field-label">💰 Price ($)</div>' +
            '<input class="editor-input" type="number" step="0.01" min="0" placeholder="e.g. 7.50" value="' + curPrice + '" data-price-id="' + item.priceId + '"/>' +
          '</div>' +
          '<div>' +
            '<div class="editor-field-label">📦 Stock</div>' +
            '<input class="editor-input" type="number" min="0" placeholder="0 = Out of Stock" value="' + curStock + '" data-stock-idx="' + item.index + '"/>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function saveOverrides() {
    var prices = {};
    var stocks = {};
    document.querySelectorAll('[data-price-id]').forEach(function(inp) {
      prices[inp.dataset.priceId] = inp.value;
    });
    document.querySelectorAll('[data-stock-idx]').forEach(function(inp) {
      stocks[inp.dataset.stockIdx] = inp.value;
    });
    localStorage.setItem('sa_prices', JSON.stringify(prices));
    localStorage.setItem('sa_stocks', JSON.stringify(stocks));
    var conf = document.getElementById('save-confirm');
    conf.textContent = '✓ Saved! Changes will appear on your shop.';
    setTimeout(function() { conf.textContent = ''; }, 3000);
  }

  function resetAnalytics() {
    if (!confirm('Reset all analytics data?')) return;
    localStorage.removeItem('sa_pageviews');
    localStorage.removeItem('sa_sessions');
    localStorage.removeItem('sa_views');
    localStorage.removeItem('sa_atc');
    loadDashboard();
  }

  function resetPrices() {
    if (!confirm('Reset all price/stock overrides? Items will show original values.')) return;
    localStorage.removeItem('sa_prices');
    localStorage.removeItem('sa_stocks');
    buildEditor();
    var conf = document.getElementById('save-confirm');
    conf.textContent = '✓ Overrides cleared.';
    setTimeout(function() { conf.textContent = ''; }, 3000);
  }
</script>
</body>
</html>
